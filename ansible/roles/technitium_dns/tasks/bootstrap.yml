---
# ==============================================================================
# File: ansible/roles/technitium_dns/tasks/bootstrap.yml
# Purpose:
#   Bootstrap or verify the Technitium admin password through the Technitium API.
# Notes:
#   - API calls are delegated to localhost; SSH is not required for these tasks.
# ==============================================================================

- name: Set Technitium API base URL for this host
  ansible.builtin.set_fact:
    technitium_base_url: "{{ technitium_api_scheme }}://{{ ansible_host }}:{{ technitium_web_port }}"

- name: Try login with production password
  ansible.builtin.uri:
    url: "{{ technitium_base_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_admin_user }}"
      pass: "{{ technitium_admin_password }}"
      includeInfo: "true"
    return_content: true
    status_code: [200, 401, 403]
    timeout: "{{ technitium_api_timeout }}"
  delegate_to: localhost
  register: technitium_prod_login
  retries: "{{ technitium_api_retries }}"
  delay: "{{ technitium_api_retry_delay }}"
  until: technitium_prod_login is not failed
  failed_when: false
  no_log: true

- name: Try login with initial password when production password is not active
  ansible.builtin.uri:
    url: "{{ technitium_base_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_admin_user }}"
      pass: "{{ technitium_initial_password }}"
      includeInfo: "true"
    return_content: true
    status_code: [200, 401, 403]
    timeout: "{{ technitium_api_timeout }}"
  delegate_to: localhost
  register: technitium_initial_login
  retries: "{{ technitium_api_retries }}"
  delay: "{{ technitium_api_retry_delay }}"
  until: technitium_initial_login is not failed
  when: technitium_prod_login.json.status | default('error') != 'ok'
  failed_when: false
  no_log: true

- name: Change default or initial Technitium password
  ansible.builtin.uri:
    url: "{{ technitium_base_url }}/api/user/changePassword"
    method: POST
    headers:
      Authorization: "Bearer {{ technitium_initial_login.json.token }}"
    body_format: form-urlencoded
    body:
      pass: "{{ technitium_initial_password }}"
      newPass: "{{ technitium_admin_password }}"
      iterations: "200000"
    return_content: true
    status_code: 200
    timeout: "{{ technitium_api_timeout }}"
  delegate_to: localhost
  register: technitium_password_change
  retries: "{{ technitium_api_retries }}"
  delay: "{{ technitium_api_retry_delay }}"
  until: technitium_password_change is succeeded
  when:
    - technitium_prod_login.json.status | default('error') != 'ok'
    - technitium_initial_login.json.status | default('error') == 'ok'
  no_log: true

- name: Fail when no valid Technitium password is available
  ansible.builtin.fail:
    msg: "Could not login to Technitium with either the production password or initial password. Check credentials and web access."
  when:
    - technitium_prod_login.json.status | default('error') != 'ok'
    - technitium_initial_login.json.status | default('error') != 'ok'
