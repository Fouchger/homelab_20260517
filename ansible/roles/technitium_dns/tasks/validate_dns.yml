---
# ==============================================================================
# File: ansible/roles/technitium_dns/tasks/validate_dns.yml
# Purpose:
#   Validate DNS behaviour after Technitium configuration.
# Notes:
#   - These checks validate primary, secondary, recursion, reverse DNS and SOA sync.
# ==============================================================================

- name: Validate primary resolves the internal forward record
  ansible.builtin.command: "dig @{{ technitium_primary_ip }} {{ technitium_validation_forward_record }} +short"
  register: dig_primary
  changed_when: false
  retries: 6
  delay: 5
  until: technitium_validation_forward_ip in dig_primary.stdout
  failed_when: technitium_validation_forward_ip not in dig_primary.stdout

- name: Validate secondary resolves the internal forward record
  ansible.builtin.command: "dig @{{ technitium_secondary_ip }} {{ technitium_validation_forward_record }} +short"
  register: dig_secondary
  changed_when: false
  retries: 6
  delay: 5
  until: technitium_validation_forward_ip in dig_secondary.stdout
  failed_when: technitium_validation_forward_ip not in dig_secondary.stdout

- name: Validate primary reverse DNS
  ansible.builtin.command: "dig @{{ technitium_primary_ip }} -x {{ technitium_validation_reverse_ip }} +short"
  register: dig_primary_ptr
  changed_when: false
  retries: 6
  delay: 5
  until: technitium_validation_reverse_name in dig_primary_ptr.stdout
  failed_when: technitium_validation_reverse_name not in dig_primary_ptr.stdout

- name: Validate secondary reverse DNS
  ansible.builtin.command: "dig @{{ technitium_secondary_ip }} -x {{ technitium_validation_reverse_ip }} +short"
  register: dig_secondary_ptr
  changed_when: false
  retries: 6
  delay: 5
  until: technitium_validation_reverse_name in dig_secondary_ptr.stdout
  failed_when: technitium_validation_reverse_name not in dig_secondary_ptr.stdout

- name: Validate primary recursive resolution
  ansible.builtin.command: "dig @{{ technitium_primary_ip }} {{ technitium_validation_external_record }} +short"
  register: dig_primary_recursion
  changed_when: false
  retries: 6
  delay: 5
  until: dig_primary_recursion.stdout | length > 0
  failed_when: dig_primary_recursion.stdout | length == 0

- name: Validate secondary recursive resolution
  ansible.builtin.command: "dig @{{ technitium_secondary_ip }} {{ technitium_validation_external_record }} +short"
  register: dig_secondary_recursion
  changed_when: false
  retries: 6
  delay: 5
  until: dig_secondary_recursion.stdout | length > 0
  failed_when: dig_secondary_recursion.stdout | length == 0

- name: Read primary SOA serial for fouchger.uk
  ansible.builtin.shell: |
    set -euo pipefail
    dig @{{ technitium_primary_ip }} fouchger.uk SOA +short | awk '{print $3}'
  args:
    executable: /bin/bash
  register: technitium_primary_soa
  changed_when: false

- name: Read secondary SOA serial for fouchger.uk
  ansible.builtin.shell: |
    set -euo pipefail
    dig @{{ technitium_secondary_ip }} fouchger.uk SOA +short | awk '{print $3}'
  args:
    executable: /bin/bash
  register: technitium_secondary_soa
  changed_when: false
  retries: 6
  delay: 10
  until:
    - technitium_secondary_soa.stdout | length > 0
    - technitium_secondary_soa.stdout == technitium_primary_soa.stdout

- name: Assert primary and secondary SOA serials match
  ansible.builtin.assert:
    that:
      - technitium_primary_soa.stdout | length > 0
      - technitium_secondary_soa.stdout == technitium_primary_soa.stdout
    fail_msg: "Technitium primary and secondary SOA serials do not match for fouchger.uk."

- name: Validate primary HTTPS management proxy
  ansible.builtin.command: "curl -kfsS --max-time 10 https://{{ technitium_primary_ip }}:{{ technitium_tls_proxy_port }}/"
  register: technitium_primary_tls_proxy
  changed_when: false
  retries: 3
  delay: 5
  until: technitium_primary_tls_proxy.rc == 0
  when: technitium_tls_proxy_enabled | bool

- name: Validate secondary HTTPS management proxy
  ansible.builtin.command: "curl -kfsS --max-time 10 https://{{ technitium_secondary_ip }}:{{ technitium_tls_proxy_port }}/"
  register: technitium_secondary_tls_proxy
  changed_when: false
  retries: 3
  delay: 5
  until: technitium_secondary_tls_proxy.rc == 0
  when: technitium_tls_proxy_enabled | bool
