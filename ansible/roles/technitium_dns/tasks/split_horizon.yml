---
# ==============================================================================
# File: ansible/roles/technitium_dns/tasks/split_horizon.yml
# Purpose:
#   Optional split-horizon DNS scaffold for future internal/public DNS policy.
# Notes:
#   - Disabled by default in group_vars.
#   - When enabled, zones are created on the primary only and transferred to secondary.
# ==============================================================================

- name: Confirm split-horizon zones were supplied when enabled
  ansible.builtin.assert:
    that:
      - technitium_split_horizon_zones is defined
      - technitium_split_horizon_zones | length > 0
    fail_msg: "technitium_split_horizon_enabled is true but no technitium_split_horizon_zones are configured."
  run_once: true

- name: Set Technitium split-horizon API base URL
  ansible.builtin.set_fact:
    technitium_base_url: "{{ technitium_api_scheme }}://{{ ansible_host }}:{{ technitium_web_port }}"
  when: inventory_hostname == technitium_primary_host

- name: Login to Technitium API for split-horizon configuration
  ansible.builtin.uri:
    url: "{{ technitium_base_url }}/api/user/login"
    method: POST
    body_format: form-urlencoded
    body:
      user: "{{ technitium_admin_user }}"
      pass: "{{ technitium_admin_password }}"
      includeInfo: "true"
    return_content: true
    status_code: 200
    timeout: "{{ technitium_api_timeout }}"
  delegate_to: localhost
  register: technitium_split_horizon_login
  retries: "{{ technitium_api_retries }}"
  delay: "{{ technitium_api_retry_delay }}"
  until: technitium_split_horizon_login is succeeded
  when: inventory_hostname == technitium_primary_host
  no_log: true

- name: Create optional split-horizon primary zones
  ansible.builtin.uri:
    url: "{{ technitium_base_url }}/api/zones/create"
    method: POST
    headers:
      Authorization: "Bearer {{ technitium_split_horizon_login.json.token }}"
    body_format: form-urlencoded
    body:
      zone: "{{ item.name }}"
      type: "{{ item.type | default(technitium_primary_zone_type) }}"
      useSoaSerialDateScheme: "true"
    return_content: true
    status_code: 200
    timeout: "{{ technitium_api_timeout }}"
  delegate_to: localhost
  register: technitium_split_horizon_zone_create
  retries: "{{ technitium_api_retries }}"
  delay: "{{ technitium_api_retry_delay }}"
  until: technitium_split_horizon_zone_create is not failed
  loop: "{{ technitium_split_horizon_zones }}"
  when: inventory_hostname == technitium_primary_host
  failed_when: false
  no_log: true
