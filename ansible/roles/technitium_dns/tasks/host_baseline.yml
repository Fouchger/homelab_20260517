---
# ==============================================================================
# File: ansible/roles/technitium_dns/tasks/host_baseline.yml
# Purpose:
#   Prepare host-level firewall, tooling, and backup baseline for Technitium DNS.
# ==============================================================================

- name: Install baseline DNS operations packages
  ansible.builtin.apt:
    name: "{{ technitium_required_packages }}"
    state: present
    update_cache: true
  when: ansible_facts["os_family"] == "Debian"

- name: Detect Technitium process
  ansible.builtin.shell: |
    set -euo pipefail

    for service_name in {{ technitium_service_candidates | join(' ') }}; do
      if systemctl list-unit-files "${service_name}.service" --no-legend 2>/dev/null | grep -q "${service_name}.service"; then
        printf '%s\n' "${service_name}"
        exit 0
      fi
    done

    if pgrep -fa technitium >/dev/null 2>&1; then
      echo "technitium"
      exit 0
    fi

    if ss -lntup | grep -q ':53 '; then
      echo "dns-port-active"
      exit 0
    fi

    exit 1
  args:
    executable: /bin/bash
  register: technitium_process_check
  changed_when: false
  failed_when: technitium_process_check.rc != 0

- name: Report detected Technitium runtime
  ansible.builtin.debug:
    msg: "Detected Technitium runtime: {{ technitium_process_check.stdout }}"

- name: Set detected Technitium runtime name
  ansible.builtin.set_fact:
    technitium_runtime_name: "{{ technitium_process_check.stdout | trim }}"

- name: Ensure Technitium service is enabled and running
  ansible.builtin.systemd:
    name: "{{ technitium_runtime_name }}"
    enabled: true
    state: started
    daemon_reload: true
  when: technitium_runtime_name != "dns-port-active"


- name: Allow SSH through UFW
  ansible.builtin.command: ufw allow 22/tcp
  changed_when: false

- name: Allow DNS UDP from homelab VLANs
  ansible.builtin.command: "ufw allow from {{ item }} to any port 53 proto udp"
  loop: "{{ technitium_allowed_client_networks }}"
  changed_when: false

- name: Allow DNS TCP from homelab VLANs
  ansible.builtin.command: "ufw allow from {{ item }} to any port 53 proto tcp"
  loop: "{{ technitium_allowed_client_networks }}"
  changed_when: false

- name: Allow Technitium web console from MGMT VLAN only
  ansible.builtin.command: "ufw allow from {{ technitium_mgmt_network }} to any port {{ technitium_web_port }} proto tcp"
  changed_when: false

- name: Enable UFW with default deny incoming
  ansible.builtin.shell: |
    set -euo pipefail
    ufw default deny incoming
    ufw --force enable
  args:
    executable: /bin/bash
  changed_when: false

- name: Ensure Technitium backup directory exists
  ansible.builtin.file:
    path: "{{ technitium_backup_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Install Technitium local backup script
  ansible.builtin.template:
    src: technitium-backup.sh.j2
    dest: /usr/local/sbin/technitium-backup.sh
    owner: root
    group: root
    mode: "0750"

- name: Schedule daily Technitium configuration backup
  ansible.builtin.cron:
    name: Technitium daily configuration backup
    minute: "{{ technitium_backup_minute }}"
    hour: "{{ technitium_backup_hour }}"
    user: root
    job: /usr/local/sbin/technitium-backup.sh

- name: Configure management TLS reverse proxy
  ansible.builtin.include_tasks: tls_proxy.yml
  when: technitium_tls_proxy_enabled | bool

- name: Configure local DNS monitoring checks
  ansible.builtin.include_tasks: monitoring.yml
  when: technitium_monitoring_enabled | bool
