---
# ==============================================================================
# File: ansible/technitium/playbooks/site.yml
# Purpose:
#   Configure Technitium DNS on dns01 and dns02 for the homelab enterprise baseline.
# Notes:
#   - This playbook expects inventory group technitiumdns from state/ansible/inventory.yml.
#   - Secrets are provided as extra vars by task technitium:configure.
# ==============================================================================

- name: Validate Technitium DNS input variables
  hosts: technitiumdns
  gather_facts: false
  vars_files:
    - ../group_vars/technitiumdns.yml
  tasks:
    - name: Confirm required secrets are present
      ansible.builtin.assert:
        that:
          - technitium_initial_password is defined
          - technitium_initial_password | length > 0
          - technitium_admin_password is defined
          - technitium_admin_password | length >= 12
        fail_msg: "Technitium secrets are missing. Run: task technitium:credentials"
      run_once: true
      no_log: true

- name: Bootstrap Technitium admin password
  hosts: technitiumdns
  gather_facts: false
  vars_files:
    - ../group_vars/technitiumdns.yml
  vars:
    technitium_base_url: "{{ technitium_api_scheme }}://{{ ansible_host }}:{{ technitium_web_port }}"
  tasks:
    - name: Try login with production password
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: "{{ technitium_admin_user }}"
          pass: "{{ technitium_admin_password }}"
          includeInfo: "true"
        return_content: true
        status_code: [200, 401, 403]
      delegate_to: localhost
      register: technitium_prod_login
      failed_when: false
      no_log: true

    - name: Try login with initial password when production password is not active
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: "{{ technitium_admin_user }}"
          pass: "{{ technitium_initial_password }}"
          includeInfo: "true"
        return_content: true
        status_code: [200, 401, 403]
      delegate_to: localhost
      register: technitium_initial_login
      when: technitium_prod_login.json.status | default('error') != 'ok'
      failed_when: false
      no_log: true

    - name: Change default or initial Technitium password
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/user/changePassword"
        method: POST
        headers:
          Authorization: "Bearer {{ technitium_initial_login.json.token }}"
        body_format: form-urlencoded
        body:
          pass: "{{ technitium_initial_password }}"
          newPass: "{{ technitium_admin_password }}"
          iterations: "200000"
        return_content: true
        status_code: 200
      delegate_to: localhost
      when:
        - technitium_prod_login.json.status | default('error') != 'ok'
        - technitium_initial_login.json.status | default('error') == 'ok'
      no_log: true

    - name: Fail when no valid Technitium password is available
      ansible.builtin.fail:
        msg: "Could not login to Technitium with either the production password or initial password. Check credentials and web access."
      when:
        - technitium_prod_login.json.status | default('error') != 'ok'
        - technitium_initial_login.json.status | default('error') != 'ok'

- name: Prepare Technitium DNS host baseline
  hosts: technitiumdns
  become: true
  gather_facts: true
  vars_files:
    - ../group_vars/technitiumdns.yml
  tasks:
    - name: Install baseline DNS operations packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - dnsutils
          - jq
          - logrotate
          - python3-requests
          - ufw
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Allow SSH through UFW
      ansible.builtin.command: ufw allow 22/tcp
      changed_when: false

    - name: Allow DNS UDP from homelab VLANs
      ansible.builtin.command: "ufw allow from {{ item }} to any port 53 proto udp"
      loop: "{{ technitium_allowed_client_networks }}"
      changed_when: false

    - name: Allow DNS TCP from homelab VLANs
      ansible.builtin.command: "ufw allow from {{ item }} to any port 53 proto tcp"
      loop: "{{ technitium_allowed_client_networks }}"
      changed_when: false

    - name: Allow Technitium web console from MGMT VLAN only
      ansible.builtin.command: "ufw allow from {{ technitium_mgmt_network }} to any port {{ technitium_web_port }} proto tcp"
      changed_when: false

    - name: Enable UFW with default deny incoming
      ansible.builtin.shell: |
        set -euo pipefail
        ufw default deny incoming
        ufw --force enable
      args:
        executable: /bin/bash
      changed_when: false

    - name: Ensure Technitium backup directory exists
      ansible.builtin.file:
        path: /var/backups/technitium
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Install Technitium local backup script
      ansible.builtin.copy:
        dest: /usr/local/sbin/technitium-backup.sh
        owner: root
        group: root
        mode: "0750"
        content: |
          #!/usr/bin/env bash
          # ==============================================================================
          # File: /usr/local/sbin/technitium-backup.sh
          # Purpose: Create a retained local backup of Technitium DNS configuration.
          # ==============================================================================
          set -euo pipefail
          stamp="$(date +%Y%m%d-%H%M%S)"
          archive="/var/backups/technitium/technitium-${HOSTNAME}-${stamp}.tar.gz"
          if [ -d /etc/dns ]; then
            tar -czf "$archive" /etc/dns
            find /var/backups/technitium -type f -name 'technitium-*.tar.gz' -mtime +14 -delete
          fi

    - name: Schedule daily Technitium configuration backup
      ansible.builtin.cron:
        name: Technitium daily configuration backup
        minute: "15"
        hour: "2"
        user: root
        job: /usr/local/sbin/technitium-backup.sh

- name: Configure Technitium primary zones and records
  hosts: technitiumdns
  gather_facts: false
  vars_files:
    - ../group_vars/technitiumdns.yml
  vars:
    technitium_base_url: "{{ technitium_api_scheme }}://{{ ansible_host }}:{{ technitium_web_port }}"
  tasks:
    - name: Login to Technitium API on primary
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: "{{ technitium_admin_user }}"
          pass: "{{ technitium_admin_password }}"
          includeInfo: "true"
        return_content: true
        status_code: 200
      delegate_to: localhost
      register: technitium_login
      when: inventory_hostname == technitium_primary_host
      no_log: true

    - name: Create primary authoritative zones
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/zones/create"
        method: POST
        headers:
          Authorization: "Bearer {{ technitium_login.json.token }}"
        body_format: form-urlencoded
        body:
          zone: "{{ item.name }}"
          type: "{{ technitium_primary_zone_type }}"
          useSoaSerialDateScheme: "true"
        return_content: true
        status_code: 200
      delegate_to: localhost
      loop: "{{ technitium_zones }}"
      when: inventory_hostname == technitium_primary_host
      failed_when: false
      no_log: true

    - name: Allow zone transfer and notify to secondary
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/zones/options/set"
        method: POST
        headers:
          Authorization: "Bearer {{ technitium_login.json.token }}"
        body_format: form-urlencoded
        body:
          zone: "{{ item.name }}"
          disabled: "false"
          zoneTransfer: Allow
          zoneTransferNameServers: "{{ technitium_secondary_ip }}"
          notify: SpecifiedNameServers
          notifyNameServers: "{{ technitium_secondary_ip }}"
          queryAccess: Allow
        return_content: true
        status_code: 200
      delegate_to: localhost
      loop: "{{ technitium_zones }}"
      when: inventory_hostname == technitium_primary_host
      no_log: true

    - name: Add or update A records on primary
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/zones/records/add"
        method: POST
        headers:
          Authorization: "Bearer {{ technitium_login.json.token }}"
        body_format: form-urlencoded
        body:
          zone: "{{ item.zone }}"
          domain: "{{ item.name }}"
          type: A
          ipAddress: "{{ item.ip }}"
          ttl: "{{ item.ttl | default(3600) }}"
          overwrite: "true"
          ptr: "false"
        return_content: true
        status_code: 200
      delegate_to: localhost
      loop: "{{ technitium_a_records }}"
      when: inventory_hostname == technitium_primary_host
      no_log: true

    - name: Add or update PTR records on primary
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/zones/records/add"
        method: POST
        headers:
          Authorization: "Bearer {{ technitium_login.json.token }}"
        body_format: form-urlencoded
        body:
          zone: "{{ item.zone }}"
          domain: "{{ item.name }}"
          type: PTR
          ptrName: "{{ item.ptr }}"
          ttl: "{{ item.ttl | default(3600) }}"
          overwrite: "true"
        return_content: true
        status_code: 200
      delegate_to: localhost
      loop: "{{ technitium_ptr_records }}"
      when: inventory_hostname == technitium_primary_host
      no_log: true

- name: Configure Technitium secondary zones
  hosts: technitiumdns
  gather_facts: false
  vars_files:
    - ../group_vars/technitiumdns.yml
  vars:
    technitium_base_url: "{{ technitium_api_scheme }}://{{ ansible_host }}:{{ technitium_web_port }}"
  tasks:
    - name: Login to Technitium API on secondary
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/user/login"
        method: POST
        body_format: form-urlencoded
        body:
          user: "{{ technitium_admin_user }}"
          pass: "{{ technitium_admin_password }}"
          includeInfo: "true"
        return_content: true
        status_code: 200
      delegate_to: localhost
      register: technitium_login
      when: inventory_hostname == technitium_secondary_host
      no_log: true

    - name: Create secondary zones from primary
      ansible.builtin.uri:
        url: "{{ technitium_base_url }}/api/zones/create"
        method: POST
        headers:
          Authorization: "Bearer {{ technitium_login.json.token }}"
        body_format: form-urlencoded
        body:
          zone: "{{ item.name }}"
          type: "{{ technitium_secondary_zone_type }}"
          primaryNameServerAddresses: "{{ technitium_primary_ip }}"
          zoneTransferProtocol: Tcp
        return_content: true
        status_code: 200
      delegate_to: localhost
      loop: "{{ technitium_zones }}"
      when: inventory_hostname == technitium_secondary_host
      failed_when: false
      no_log: true

- name: Validate DNS service behaviour
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../group_vars/technitiumdns.yml
  tasks:
    - name: Validate primary resolves dns01
      ansible.builtin.command: "dig @{{ technitium_primary_ip }} dns01.fouchger.uk +short"
      register: dig_primary
      changed_when: false
      failed_when: "'192.168.30.2' not in dig_primary.stdout"

    - name: Validate secondary resolves dns01
      ansible.builtin.command: "dig @{{ technitium_secondary_ip }} dns01.fouchger.uk +short"
      register: dig_secondary
      changed_when: false
      failed_when: "'192.168.30.2' not in dig_secondary.stdout"
