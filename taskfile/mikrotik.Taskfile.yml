# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# ==============================================================================
# File: taskfile/mikrotik.Taskfile.yml
# Purpose:
#   Staged MikroTik RouterOS setup, backup, automation bootstrap, baseline apply,
#   and validation tasks for the homelab control plane.
# Notes:
#   - The first run asks for the current MikroTik admin password and stores it in
#     the encrypted SOPS password file.
#   - Backups include sensitive exports by design and are stored under state/.
# ==============================================================================

version: '3'

tasks:
  default:
    desc: Show available MikroTik tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show MikroTik tasks
    cmds:
      - task --taskfile "{{.TASKFILE}}" --list

  help:
    desc: Show MikroTik task help
    cmds:
      - |
        set -euo pipefail
        cat <<'EOHELP'
        MikroTik task help

        Routine flow
          task mikrotik:setup
            Ask once for the current admin password, save secrets in SOPS,
            back up the current router including sensitive values, render the
            staged baseline, upload it, import it, and validate access.

          task mikrotik:backup
            Create and download a sensitive export and encrypted binary backup.

          task mikrotik:configure
            Render and apply the staged RouterOS baseline.

          task mikrotik:validate
            Validate SSH/API reachability and core RouterOS state.

        Credential rotation
          MIKROTIK_CREDENTIALS_FORCE=1 task mikrotik:credentials
            Re-enter the current admin password and rotate generated automation
            values in the encrypted password file.
        EOHELP

  setup:
    desc: Back up and configure MikroTik RouterOS for the homelab automatically.
    cmds:
      - task: credentials
      - task: backup
      - task: configure
      - task: validate

  credentials:
    desc: Ensure MikroTik credentials exist in the encrypted password file.
    deps:
      - :passwords:encrypt
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
          PASSWORDS_ENCRYPTED_FILE='{{.ROOT_DIR}}/{{.PASSWORDS_ENCRYPTED_FILE}}' \
          SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}" \
          SOPS_AGE_RECIPIENTS_FILE='{{.ROOT_DIR}}/{{.SOPS_AGE_RECIPIENTS_FILE}}' \
          '{{.ROOT_DIR}}/scripts/lib/mikrotik-credentials.sh'

  backup:
    desc: Create and download sensitive MikroTik export and binary backup.
    deps:
      - credentials
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
          PASSWORDS_ENCRYPTED_FILE='{{.ROOT_DIR}}/{{.PASSWORDS_ENCRYPTED_FILE}}' \
          SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}" \
          '{{.ROOT_DIR}}/scripts/lib/mikrotik-backup.sh'

  render:
    desc: Render the staged MikroTik RouterOS baseline script.
    deps:
      - credentials
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
          PASSWORDS_ENCRYPTED_FILE='{{.ROOT_DIR}}/{{.PASSWORDS_ENCRYPTED_FILE}}' \
          SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}" \
          '{{.ROOT_DIR}}/scripts/lib/mikrotik-render-baseline.sh'

  configure:
    desc: Upload and import the staged MikroTik RouterOS baseline script.
    deps:
      - render
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
          PASSWORDS_ENCRYPTED_FILE='{{.ROOT_DIR}}/{{.PASSWORDS_ENCRYPTED_FILE}}' \
          SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}" \
          SOPS_AGE_RECIPIENTS_FILE='{{.ROOT_DIR}}/{{.SOPS_AGE_RECIPIENTS_FILE}}' \
          '{{.ROOT_DIR}}/scripts/lib/mikrotik-apply-baseline.sh'

  validate:
    desc: Validate MikroTik SSH/API access and core DNS/DHCP settings.
    deps:
      - credentials
    cmds:
      - |
        set -euo pipefail
        ROOT_DIR='{{.ROOT_DIR}}' \
          PASSWORDS_ENCRYPTED_FILE='{{.ROOT_DIR}}/{{.PASSWORDS_ENCRYPTED_FILE}}' \
          SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}" \
          '{{.ROOT_DIR}}/scripts/lib/mikrotik-validate.sh'
