# yaml-language-server: $schema=https://taskfile.dev/schema.json
---
# =============================================================================
# Password and SOPS tasks
# =============================================================================
# Purpose:
#   Manage homelab password files using SOPS and age.
# Notes:
#   - SOPS and age are command line tools, not background services.
#   - The configure task validates them and prepares local key material.
#   - Keep the default SOPS age key at ${HOME}/.config/sops/age/keys.txt and back it up offline.
#   - Runtime decrypted files are removed by cleanup tasks and shell traps.
# =============================================================================

version: '3'

vars:
  # Task-specific version and download policy. Shared paths are defined in the root Taskfile.
  SOPS_VERSION: v3.9.4
  SOPS_LINUX_AMD64_URL: https://github.com/getsops/sops/releases/download/{{.SOPS_VERSION}}/sops-{{.SOPS_VERSION}}.linux.amd64

tasks:
  default:
    desc: Show available password tasks
    cmds:
      - task: tasklist

  tasklist:
    desc: Show the available password tasks
    cmds:
      - task --taskfile "{{.TASKFILE}}" --list

  help:
    desc: Show safe password tasks and what each task does
    cmds:
      - |
        set -euo pipefail

        cat <<'EOHELP'
        Safe password task help

        This list is limited to normal operator tasks. Destructive,
        high-risk, or plaintext-exposing tasks are intentionally excluded.

        ──────────────────────────────────────────────────────────────
        Setup
        ──────────────────────────────────────────────────────────────
          task passwords:setup
            Install tools, configure SOPS and age, generate keys, create an
            offline backup, encrypt the password file, and clean up plaintext
            runtime files.

          task passwords:install
            Install SOPS, age, and required packages. Existing packages are
            recorded to avoid removing shared prerequisites later.

          task passwords:configure
            Validate tooling and select the password editor: nano, vi, or vim.
            The selected editor is installed if it does not exist.

          task passwords:keys:generate
            Generate required age key material and the SOPS recipient. Existing
            keys are preserved.

          task passwords:backup:offline
            Create an offline-backup bundle for SOPS config and age key
            material. Move the bundle to offline storage after creation.

          task passwords:encrypt
            Create the initial encrypted password file. Existing encrypted
            password files are left unchanged.

        ──────────────────────────────────────────────────────────────
        Operations
        ──────────────────────────────────────────────────────────────
          task passwords:edit
            Edit passwords securely through SOPS using the selected editor.
            Plaintext runtime files are removed after editing.

          task passwords:audit
            Produce a report without printing secret values. Flags blank,
            placeholder, duplicate, and short values.

          task passwords:cleanup
            Remove runtime plaintext password files and temporary decrypted
            files. Safe to run after any password operation.

        ──────────────────────────────────────────────────────────────
        Excluded from safe help
        ──────────────────────────────────────────────────────────────
          task passwords:decrypt
            Creates a runtime plaintext file.

          task passwords:display
            Prints secrets to the terminal.

          task passwords:keys:rotate
            Advanced key maintenance requiring backup discipline.

          task passwords:destroy
            Destructive removal of password material and task-owned tooling.
        EOHELP

  setup:
    desc: Install tools, configure age/SOPS, generate keys, back up keys, and create or encrypt the password file.
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Install tools, configure age/SOPS, generate keys, back up keys, and create or encrypt the password file." "PEACH"  
      - task: install
      - task: configure
      - task: keys:generate
      - task: backup:offline
      - task: encrypt
      - task: cleanup

  install:
    desc: Install SOPS, age, and required prerequisites.
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Install SOPS, age, and required prerequisites." "PEACH"  
      - |
        set -euo pipefail

        mkdir -p "{{.SOPS_DIR}}"
        touch "{{.INSTALL_STATE_FILE}}"

        require_sudo() {
          if [[ "${EUID}" -eq 0 ]]; then
            SUDO=""
          else
            SUDO="sudo"
          fi
        }

        package_installed() {
          dpkg-query -W -f='${Status}' "$1" 2>/dev/null | grep -q "install ok installed"
        }

        record_if_missing() {
          local package_name="$1"
          if package_installed "$package_name"; then
            echo "${package_name}=preexisting" >> "{{.INSTALL_STATE_FILE}}.tmp"
          else
            echo "${package_name}=installed_by_task" >> "{{.INSTALL_STATE_FILE}}.tmp"
          fi
        }

        require_sudo

        : > "{{.INSTALL_STATE_FILE}}.tmp"
        for package_name in ca-certificates curl gnupg age; do
          record_if_missing "$package_name"
        done
        mv "{{.INSTALL_STATE_FILE}}.tmp" "{{.INSTALL_STATE_FILE}}"

        $SUDO apt-get update -y
        $SUDO apt-get install -y ca-certificates curl gnupg age

        if ! command -v sops >/dev/null 2>&1; then
          tmp_file="$(mktemp)"
          trap 'rm -f "$tmp_file"' EXIT
          curl -fsSL "{{.SOPS_LINUX_AMD64_URL}}" -o "$tmp_file"
          $SUDO install -m 0755 "$tmp_file" /usr/local/bin/sops
          echo "sops=installed_by_task" >> "{{.INSTALL_STATE_FILE}}"
        else
          echo "sops=preexisting" >> "{{.INSTALL_STATE_FILE}}"
        fi

        echo "Installed tool versions:"
        sops --version --disable-version-check
        age --version

  configure:
    desc: Configure SOPS and age, and select the password editor.
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Configure SOPS and age, and select the password editor." "PEACH"  

      - |
        set -euo pipefail

        require_sudo() {
          if [[ "${EUID}" -eq 0 ]]; then
            SUDO=""
          else
            SUDO="sudo"
          fi
        }

        require_sudo
        mkdir -p "{{.PASSWORDS_DIR}}" "{{.SOPS_DIR}}" "{{.OFFLINE_BACKUP_DIR}}"
        chmod 700 "{{.SOPS_DIR}}" "{{.PASSWORDS_DIR}}"

        if ! command -v sops >/dev/null 2>&1; then
          echo "ERROR: sops is not installed. Run: task passwords:install" >&2
          exit 1
        fi

        if ! command -v age >/dev/null 2>&1; then
          echo "ERROR: age is not installed. Run: task passwords:install" >&2
          exit 1
        fi

        echo "SOPS and age are command line tools and do not run as background services."
        echo "This task validates the tools and prepares the password workflow."
        echo
        echo "Available password editors: nano, vi, vim"

        while true; do
          printf "Select password editor [nano]: "
          read -r selected_editor
          selected_editor="${selected_editor:-nano}"

          case "$selected_editor" in
            nano|vi|vim)
              break
              ;;
            *)
              echo "ERROR: Select nano, vi, or vim."
              ;;
          esac
        done

        if ! command -v "$selected_editor" >/dev/null 2>&1; then
          case "$selected_editor" in
            nano|vim)
              $SUDO apt-get update -y
              $SUDO apt-get install -y "$selected_editor"
              ;;
            vi)
              $SUDO apt-get update -y
              $SUDO apt-get install -y vim-tiny
              ;;
          esac
        fi

        if [[ ! -f "{{.CONFIG_ENV_FILE}}" ]]; then
          echo "ERROR: Missing config file: {{.CONFIG_ENV_FILE}}" >&2
          echo "Run ./install.sh first. Only install.sh may create this file." >&2
          exit 1
        fi

        CONFIG_ENV_FILE="{{.CONFIG_ENV_FILE}}" PASSWORD_EDITOR_VALUE="$selected_editor" perl -0pi -e '
          my $key = "PASSWORD_EDITOR";
          my $value = $ENV{"PASSWORD_EDITOR_VALUE"};
          $value =~ s/\\/\\\\/g;
          $value =~ s/"/\\"/g;
          my $line = "$key=\"$value\"\n";
          if (s/^\Q$key\E=.*/$line/m) {
            # Existing value updated in place.
          } else {
            $_ .= "\n" if length($_) && $_ !~ /\n\z/;
            $_ .= $line;
          }
        ' "{{.CONFIG_ENV_FILE}}"
        chmod 600 "{{.CONFIG_ENV_FILE}}"

        echo "Configured password editor: $selected_editor"

  keys:generate:
    desc: Generate age keys required by SOPS.
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Generate age keys required by SOPS." "PEACH"  

      - |
        set -euo pipefail

        mkdir -p "$(dirname "{{.SOPS_AGE_KEY_FILE}}")" "{{.SOPS_DIR}}" "{{.OFFLINE_BACKUP_DIR}}"
        chmod 700 "$(dirname "{{.SOPS_AGE_KEY_FILE}}")" "{{.SOPS_DIR}}" "{{.OFFLINE_BACKUP_DIR}}"

        legacy_key_file="{{.SOPS_DIR}}/keys.txt"
        if [[ ! -f "{{.SOPS_AGE_KEY_FILE}}" && -f "$legacy_key_file" ]]; then
          cp "$legacy_key_file" "{{.SOPS_AGE_KEY_FILE}}"
          chmod 600 "{{.SOPS_AGE_KEY_FILE}}"
          mv "$legacy_key_file" "{{.OFFLINE_BACKUP_DIR}}/legacy-sops-age-key-$(date +%Y%m%d-%H%M%S).txt"
          echo "Migrated legacy repository SOPS age key to the default SOPS location: {{.SOPS_AGE_KEY_FILE}}"
        fi

        if [[ -f "{{.SOPS_AGE_KEY_FILE}}" ]]; then
          echo "Default SOPS age key file already exists: {{.SOPS_AGE_KEY_FILE}}"
        else
          age-keygen -o "{{.SOPS_AGE_KEY_FILE}}"
          chmod 600 "{{.SOPS_AGE_KEY_FILE}}"
        fi

        age-keygen -y "{{.SOPS_AGE_KEY_FILE}}" > "{{.SOPS_AGE_RECIPIENTS_FILE}}"
        chmod 600 "{{.SOPS_AGE_RECIPIENTS_FILE}}"

        recipient="$(cat "{{.SOPS_AGE_RECIPIENTS_FILE}}")"
        cat > "{{.SOPS_CONFIG_FILE}}" <<EOSOPS
        # =============================================================================
        # File: .sops.yaml
        # Purpose: SOPS encryption rules for homelab secrets.
        # =============================================================================
        creation_rules:
          - path_regex: {{.PASSWORDS_DIR}}/.*\\.env$
            age: "$recipient"
        EOSOPS

        echo "Generated SOPS age recipient: $recipient"

  backup:offline:
    desc: Create an offline backup bundle for SOPS and age key material.
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Create an offline backup bundle for SOPS and age key material." "PEACH"  

      - |
        set -euo pipefail

        mkdir -p "{{.OFFLINE_BACKUP_DIR}}"
        chmod 700 "{{.OFFLINE_BACKUP_DIR}}"

        if [[ ! -f "{{.SOPS_AGE_KEY_FILE}}" ]]; then
          echo "ERROR: Missing age key file. Run: task passwords:keys:generate" >&2
          exit 1
        fi

        backup_file="{{.OFFLINE_BACKUP_DIR}}/sops-age-offline-backup-$(date +%Y%m%d-%H%M%S).tar.gz"
        tar -czf "$backup_file" "{{.SOPS_CONFIG_FILE}}" "{{.SOPS_AGE_RECIPIENTS_FILE}}" "{{.SOPS_AGE_KEY_FILE}}"
        chmod 600 "$backup_file"

        echo "Offline backup created: $backup_file"
        echo "Move this file to offline storage, then remove local copies if your recovery model allows it."

  encrypt:
    desc: Create or encrypt the password file using SOPS and age.
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Create or encrypt the password file using SOPS and age." "PEACH"  

      - |
        set -euo pipefail

        export SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}"
        mkdir -p "{{.PASSWORDS_DIR}}"
        chmod 700 "{{.PASSWORDS_DIR}}"

        if [[ ! -f "$SOPS_AGE_KEY_FILE" ]]; then
          echo "ERROR: Missing age key file. Run: task passwords:keys:generate" >&2
          exit 1
        fi

        runtime_file="{{.PASSWORDS_RUNTIME_FILE}}"
        encrypted_file="{{.PASSWORDS_ENCRYPTED_FILE}}"
        trap 'rm -f "{{.PASSWORDS_RUNTIME_FILE}}"' EXIT

        if [[ -f "$encrypted_file" ]]; then
          if grep -Eq '^(sops_|sops:)' "$encrypted_file"; then
            echo "Encrypted password file already exists: $encrypted_file"
            exit 0
          fi

          timestamp="$(date +%Y%m%d-%H%M%S)"
          invalid_file="${encrypted_file}.invalid-${timestamp}"
          mv "$encrypted_file" "$invalid_file"
          chmod 600 "$invalid_file"

          if [[ -s "$invalid_file" && ! -f "$runtime_file" ]]; then
            cp "$invalid_file" "$runtime_file"
            chmod 600 "$runtime_file"
            echo "WARNING: Existing password file had no SOPS metadata." >&2
            echo "Preserved it as: $invalid_file" >&2
            echo "Re-encrypting its contents now." >&2
          else
            echo "WARNING: Existing password file had no SOPS metadata and was moved to: $invalid_file" >&2
          fi
        fi

        if [[ ! -f "$runtime_file" ]]; then
          cat > "$runtime_file" <<'EOPASSWORDS'
        # =============================================================================
        # File: passwords.env
        # Purpose: Homelab secrets managed through SOPS and age.
        # Notes:
        #   - Keep key names descriptive.
        #   - Store values as KEY=value pairs.
        # =============================================================================
        EXAMPLE_SERVICE_USERNAME=change-me
        EXAMPLE_SERVICE_PASSWORD=change-me
        EOPASSWORDS
          chmod 600 "$runtime_file"
        fi

        sops --encrypt --age "$(cat '{{.SOPS_AGE_RECIPIENTS_FILE}}')" --input-type dotenv --output-type dotenv "$runtime_file" > "$encrypted_file"
        chmod 600 "$encrypted_file"
        rm -f "$runtime_file"
        echo "Encrypted password file created: $encrypted_file"

  decrypt:
    desc: Decrypt the password file to a temporary runtime file.
    cmds:
      - |
        set -euo pipefail

        export SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}"

        if [[ ! -f "{{.PASSWORDS_ENCRYPTED_FILE}}" ]]; then
          echo "ERROR: Missing encrypted password file. Run: task passwords:encrypt" >&2
          exit 1
        fi

        sops --decrypt --input-type dotenv --output-type dotenv "{{.PASSWORDS_ENCRYPTED_FILE}}" > "{{.PASSWORDS_RUNTIME_FILE}}"
        chmod 600 "{{.PASSWORDS_RUNTIME_FILE}}"
        echo "Decrypted runtime password file: {{.PASSWORDS_RUNTIME_FILE}}"
        echo "Run cleanup when finished: task passwords:cleanup"

  display:
    desc: Display decrypted passwords in the terminal.
    cmds:
      - |
        set -euo pipefail

        export SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}"

        if [[ ! -f "{{.PASSWORDS_ENCRYPTED_FILE}}" ]]; then
          echo "ERROR: Missing encrypted password file. Run: task passwords:encrypt" >&2
          exit 1
        fi

        sops --decrypt --input-type dotenv --output-type dotenv "{{.PASSWORDS_ENCRYPTED_FILE}}"

  edit:
    desc: Edit encrypted passwords with the selected editor.
    cmds:
      - |
        set -euo pipefail

        export SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}"
        selected_editor="${PASSWORD_EDITOR:-}"

        if [[ -z "$selected_editor" && -f "{{.CONFIG_ENV_FILE}}" ]]; then
          selected_editor="$(grep '^PASSWORD_EDITOR=' "{{.CONFIG_ENV_FILE}}" | tail -n 1 | cut -d= -f2- || true)"
        fi

        selected_editor="${selected_editor:-nano}"

        if ! command -v "$selected_editor" >/dev/null 2>&1; then
          echo "ERROR: Password editor is not installed: $selected_editor" >&2
          echo "Run: task passwords:configure" >&2
          exit 1
        fi

        if [[ ! -f "{{.PASSWORDS_ENCRYPTED_FILE}}" ]] || ! grep -Eq '^(sops_|sops:)' "{{.PASSWORDS_ENCRYPTED_FILE}}"; then
          echo "Encrypted password file is missing or has no SOPS metadata. Rebuilding it now."
          task passwords:encrypt
        fi

        if [[ ! -f "{{.PASSWORDS_ENCRYPTED_FILE}}" ]] || ! grep -Eq '^(sops_|sops:)' "{{.PASSWORDS_ENCRYPTED_FILE}}"; then
          echo "ERROR: Could not create a valid encrypted password file." >&2
          echo "Check .sops.yaml and run: task passwords:keys:generate" >&2
          exit 1
        fi

        set +e
        EDITOR="$selected_editor" sops "{{.PASSWORDS_ENCRYPTED_FILE}}"
        sops_exit_code="$?"
        set -e

        rm -f "{{.PASSWORDS_RUNTIME_FILE}}"

        if [[ "$sops_exit_code" -eq 200 ]]; then
          echo "No password changes made."
          exit 0
        fi

        if [[ "$sops_exit_code" -ne 0 ]]; then
          exit "$sops_exit_code"
        fi

  keys:rotate:
    desc: Rotate age keys and re-encrypt the password file.
    cmds:
      - |
        set -euo pipefail

        export SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}"

        if [[ ! -f "{{.SOPS_AGE_KEY_FILE}}" ]]; then
          echo "ERROR: Missing existing age key file. Run: task passwords:keys:generate" >&2
          exit 1
        fi

        if [[ ! -f "{{.PASSWORDS_ENCRYPTED_FILE}}" ]]; then
          echo "ERROR: Missing encrypted password file. Run: task passwords:encrypt" >&2
          exit 1
        fi

        timestamp="$(date +%Y%m%d-%H%M%S)"
        cp "{{.SOPS_AGE_KEY_FILE}}" "{{.SOPS_AGE_KEY_FILE}}.$timestamp.old"
        chmod 600 "{{.SOPS_AGE_KEY_FILE}}.$timestamp.old"

        age-keygen -o "{{.SOPS_AGE_KEY_FILE}}.new"
        chmod 600 "{{.SOPS_AGE_KEY_FILE}}.new"
        new_recipient="$(age-keygen -y "{{.SOPS_AGE_KEY_FILE}}.new")"

        cp "{{.SOPS_AGE_KEY_FILE}}" "{{.SOPS_AGE_KEY_FILE}}.decrypt"
        SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}.decrypt" sops --decrypt --input-type dotenv --output-type dotenv "{{.PASSWORDS_ENCRYPTED_FILE}}" > "{{.PASSWORDS_RUNTIME_FILE}}"

        mv "{{.SOPS_AGE_KEY_FILE}}.new" "{{.SOPS_AGE_KEY_FILE}}"
        printf '%s\n' "$new_recipient" > "{{.SOPS_AGE_RECIPIENTS_FILE}}"
        chmod 600 "{{.SOPS_AGE_KEY_FILE}}" "{{.SOPS_AGE_RECIPIENTS_FILE}}"

        cat > "{{.SOPS_CONFIG_FILE}}" <<EOSOPS
        # =============================================================================
        # File: .sops.yaml
        # Purpose: SOPS encryption rules for homelab secrets.
        # =============================================================================
        creation_rules:
          - path_regex: {{.PASSWORDS_DIR}}/.*\\.env$
            age: "$new_recipient"
        EOSOPS

        SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}" sops --encrypt --age "$new_recipient" --input-type dotenv --output-type dotenv "{{.PASSWORDS_RUNTIME_FILE}}" > "{{.PASSWORDS_ENCRYPTED_FILE}}"
        chmod 600 "{{.PASSWORDS_ENCRYPTED_FILE}}"
        rm -f "{{.PASSWORDS_RUNTIME_FILE}}" "{{.SOPS_AGE_KEY_FILE}}.decrypt"

        echo "Rotated age key and re-encrypted password file."
        echo "Previous key backup retained at: {{.SOPS_AGE_KEY_FILE}}.$timestamp.old"
        echo "Create a fresh offline backup now: task passwords:backup:offline"

  audit:
    desc: Audit password file and create a report without printing secret values.
    cmds:
      - |
        set -euo pipefail

        export SOPS_AGE_KEY_FILE="{{.SOPS_AGE_KEY_FILE}}"
        report_file="{{.PASSWORD_AUDIT_REPORT}}"
        runtime_file="{{.PASSWORDS_RUNTIME_FILE}}"
        trap 'rm -f "$runtime_file"' EXIT

        mkdir -p "$(dirname "$report_file")"

        if [[ ! -f "{{.SOPS_AGE_KEY_FILE}}" ]]; then
          echo "ERROR: Missing age key file: {{.SOPS_AGE_KEY_FILE}}" >&2
          echo "Run: task passwords:keys:generate" >&2
          exit 1
        fi

        if [[ ! -f "{{.PASSWORDS_ENCRYPTED_FILE}}" ]]; then
          echo "ERROR: Missing encrypted password file: {{.PASSWORDS_ENCRYPTED_FILE}}" >&2
          echo "Run: task passwords:encrypt" >&2
          exit 1
        fi

        encrypted_file="{{.PASSWORDS_ENCRYPTED_FILE}}"

        if ! grep -Eq '^(sops_|sops:)' "$encrypted_file"; then
          echo "Password file has no SOPS metadata. Attempting safe repair with: task passwords:encrypt" >&2
          task passwords:encrypt
        fi

        if ! sops --decrypt --input-type dotenv --output-type dotenv "$encrypted_file" > "$runtime_file"; then
          rm -f "$runtime_file"
          echo "Password file could not be decrypted. Attempting safe repair with: task passwords:encrypt" >&2
          task passwords:encrypt

          if ! sops --decrypt --input-type dotenv --output-type dotenv "$encrypted_file" > "$runtime_file"; then
            echo "ERROR: Could not decrypt password file for audit after repair." >&2
            echo "Check that {{.SOPS_AGE_KEY_FILE}} contains the matching private age key." >&2
            rm -f "$runtime_file"
            exit 1
          fi
        fi
        chmod 600 "$runtime_file"

        password_lines="$(grep -E '^[A-Za-z_][A-Za-z0-9_]*=' "$runtime_file" || true)"
        total_entries="$(printf '%s\n' "$password_lines" | sed '/^$/d' | wc -l | tr -d ' ')"
        blank_values="$(printf '%s\n' "$password_lines" | grep -E '^[A-Za-z_][A-Za-z0-9_]*=$' | wc -l | tr -d ' ' || true)"
        placeholder_values="$(printf '%s\n' "$password_lines" | grep -Ei '=(change-me|changeme|password|admin|test|example|todo)$' | wc -l | tr -d ' ' || true)"
        duplicate_keys="$(printf '%s\n' "$password_lines" | sed '/^$/d' | cut -d= -f1 | sort | uniq -d | wc -l | tr -d ' ')"
        short_values="$(awk -F= '/^[A-Za-z_][A-Za-z0-9_]*=/ { if (length($2) > 0 && length($2) < 12) count++ } END { print count + 0 }' "$runtime_file")"

        if [[ "$total_entries" -eq 0 ]]; then
          audit_status="No password entries were found. Add KEY=value entries with: task passwords:edit"
        elif [[ "$blank_values" -gt 0 || "$placeholder_values" -gt 0 || "$duplicate_keys" -gt 0 || "$short_values" -gt 0 ]]; then
          audit_status="Review recommended."
        else
          audit_status="No common password hygiene issues found."
        fi

        cat > "$report_file" <<EOREPORT
        # Password audit report

        Generated: $(date -Iseconds)
        Encrypted file: {{.PASSWORDS_ENCRYPTED_FILE}}

        Summary
        - Total entries: $total_entries
        - Blank values: $blank_values
        - Placeholder values: $placeholder_values
        - Duplicate keys: $duplicate_keys
        - Values shorter than 12 characters: $short_values
        - Status: $audit_status

        Recommended actions
        - Add password entries if the file is empty.
        - Replace blank and placeholder values.
        - Avoid short passwords where the target system supports longer secrets.
        - Rotate any passwords that have been shown in terminals, logs, screenshots, or tickets.
        - Keep the age private key in offline storage and limit local copies.
        EOREPORT

        chmod 600 "$report_file"
        rm -f "$runtime_file"
        cat "$report_file"

  cleanup:
    desc: Remove runtime unencrypted password files.
    cmds:
      - |
        # Print Header
        set -euo pipefail
        # shellcheck source=/dev/null
        source "${ROOT_DIR}/{{.TERMINAL_COLOURS_SCRIPT}}"
        print_section_header "Remove runtime unencrypted password files." "PEACH"  

      - |
        set -euo pipefail
        rm -f "{{.PASSWORDS_RUNTIME_FILE}}"
        find "{{.PASSWORDS_DIR}}" -type f \( -name '*.runtime.env' -o -name '*.tmp' -o -name '*.decrypted' \) -delete 2>/dev/null || true
        echo "Removed runtime unencrypted password files."

  destroy:
    desc: Destroy passwords and uninstall SOPS and age where safely owned by this task.
    cmds:
      - |
        set -euo pipefail

        require_sudo() {
          if [[ "${EUID}" -eq 0 ]]; then
            SUDO=""
          else
            SUDO="sudo"
          fi
        }

        require_sudo

        echo "WARNING: This will destroy password files, SOPS keys, local backups, and related runtime files."
        printf "Type DESTROY to continue: "
        read -r confirmation

        if [[ "$confirmation" != "DESTROY" ]]; then
          echo "Cancelled."
          exit 0
        fi

        rm -f "{{.PASSWORDS_ENCRYPTED_FILE}}" "{{.PASSWORDS_RUNTIME_FILE}}" "{{.PASSWORD_AUDIT_REPORT}}"
        rm -rf "{{.SOPS_DIR}}" "{{.OFFLINE_BACKUP_DIR}}"
        rm -f "{{.SOPS_CONFIG_FILE}}"

        if [[ -f /usr/local/bin/sops ]] && grep -q '^sops=installed_by_task$' "{{.INSTALL_STATE_FILE}}" 2>/dev/null; then
          $SUDO rm -f /usr/local/bin/sops
        fi

        removable_packages=()
        for package_name in age ca-certificates curl gnupg; do
          if ! grep -q "^${package_name}=installed_by_task$" "{{.INSTALL_STATE_FILE}}" 2>/dev/null; then
            continue
          fi

          reverse_dependency_count="$(apt-cache rdepends --installed "$package_name" 2>/dev/null | awk 'NF && $0 !~ /Reverse Depends:/ && $1 != "'$package_name'" { count++ } END { print count + 0 }')"
          if [[ "$reverse_dependency_count" -eq 0 ]]; then
            removable_packages+=("$package_name")
          else
            echo "Keeping $package_name because installed packages still depend on it."
          fi
        done

        if [[ "${#removable_packages[@]}" -gt 0 ]]; then
          $SUDO apt-get remove -y "${removable_packages[@]}" || true
          $SUDO apt-get autoremove -y || true
        fi

        rm -f "{{.INSTALL_STATE_FILE}}"
        echo "Destroyed password material and removed task-owned tools where safe."
