# ==============================================================================
# File: ansible.cfg
# Purpose:
#   Keep Ansible execution anchored to this homelab repository.
# Notes:
#   - Ensures playbooks can find roles stored under ansible/roles when run from
#     task wrappers or from absolute playbook paths.
# ==============================================================================
[defaults]
roles_path = ./ansible/roles:./ansible/playbooks/roles:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
inventory = ./state/ansible/inventory.yml
retry_files_enabled = False
host_key_checking = True
interpreter_python = auto_silent
